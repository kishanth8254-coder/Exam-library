      window.closeMCQModal = () => {
        const modal = document.getElementById('mcq-modal');
        const backdrop = document.getElementById('mcq-backdrop');
        const content = document.getElementById('mcq-content');
        backdrop.classList.add('opacity-0');
        content.classList.add('opacity-0', 'scale-95');
        setTimeout(() => modal.classList.add('hidden'), 300);
      };

      document.getElementById('mcq-close-btn').onclick = window.closeMCQModal;

      window.showEditModal = function(title, fields, onSave) {
        const modal = document.getElementById('custom-edit-modal');
        const backdrop = document.getElementById('custom-edit-backdrop');
        const content = document.getElementById('custom-edit-content');
        const titleEl = document.getElementById('custom-edit-title');
        const fieldsContainer = document.getElementById('custom-edit-fields');
        const cancelBtn = document.getElementById('custom-edit-cancel');
        const form = document.getElementById('custom-edit-form');
        
        titleEl.textContent = title;
        fieldsContainer.innerHTML = '';
        
        fields.forEach(field => {
          const div = document.createElement('div');
          const label = document.createElement('label');
          label.className = "block text-[8px] font-extrabold uppercase tracking-wide text-slate-550 mb-1";
          label.textContent = field.label;
          div.appendChild(label);
          
          if (field.type === 'select') {
            const select = document.createElement('select');
            select.id = "edit-field-" + field.id;
            select.className = "w-full bg-slate-50 dark:bg-slate-950 text-[10px] text-slate-900 dark:text-white border dark:border-slate-800 rounded-lg p-2 font-bold focus:outline-none";
            field.options.forEach(opt => {
              const option = document.createElement('option');
              option.value = opt.value;
              option.textContent = opt.label;
              if (opt.value === field.value) option.selected = true;
              select.appendChild(option);
            });
            div.appendChild(select);
          } else if (field.type === 'textarea') {
            const textarea = document.createElement('textarea');
            textarea.id = "edit-field-" + field.id;
            textarea.className = "w-full bg-slate-50 dark:bg-slate-950 text-[10px] text-slate-900 dark:text-white border dark:border-slate-800 rounded-lg p-2 font-bold focus:outline-none";
            textarea.rows = 4;
            textarea.value = field.value || "";
            div.appendChild(textarea);
          } else {
            const input = document.createElement('input');
            input.type = field.type || 'text';
            input.id = "edit-field-" + field.id;
            input.className = "w-full bg-slate-50 dark:bg-slate-950 text-[10px] text-slate-900 dark:text-white border dark:border-slate-800 rounded-lg p-2 font-bold focus:outline-none";
            input.value = field.value || "";
            div.appendChild(input);
          }
          fieldsContainer.appendChild(div);
        });
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        setTimeout(() => {
          backdrop.classList.remove('opacity-0');
          backdrop.classList.add('opacity-100');
          content.classList.remove('scale-95', 'opacity-0');
          content.classList.add('scale-100', 'opacity-100');
        }, 10);
        
        const closeModal = () => {
          backdrop.classList.remove('opacity-100');
          backdrop.classList.add('opacity-0');
          content.classList.remove('scale-100', 'opacity-100');
          content.classList.add('scale-95', 'opacity-0');
          setTimeout(() => {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
          }, 300);
        };

        cancelBtn.onclick = closeModal;
        form.onsubmit = (e) => {
          e.preventDefault();
          const values = {};
          fields.forEach(field => {
            values[field.id] = document.getElementById("edit-field-" + field.id).value;
          });
          closeModal();
          if (onSave) onSave(values);
        };
      };

      window.showDeleteConfirm = function(title, message, callback) {
        const modal = document.getElementById('custom-confirm-modal');
        const backdrop = document.getElementById('custom-confirm-backdrop');
        const content = document.getElementById('custom-confirm-content');
        const titleEl = document.getElementById('custom-confirm-title');
        const msgEl = document.getElementById('custom-confirm-message');
        const closeBtn = document.getElementById('custom-confirm-cancel');
        const okBtn = document.getElementById('custom-confirm-ok');
        
        titleEl.textContent = title;
        msgEl.textContent = message;
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        setTimeout(() => {
          backdrop.classList.remove('opacity-0');
          backdrop.classList.add('opacity-100');
          content.classList.remove('scale-95', 'opacity-0');
          content.classList.add('scale-100', 'opacity-100');
        }, 10);
        
        const closeModal = () => {
          backdrop.classList.remove('opacity-100');
          backdrop.classList.add('opacity-0');
          content.classList.remove('scale-100', 'opacity-100');
          content.classList.add('scale-95', 'opacity-0');
          setTimeout(() => {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
          }, 300);
        };

        closeBtn.onclick = closeModal;
        okBtn.onclick = () => {
          closeModal();
          if (callback) {
            callback();
          }
        };
      };

      function getSubjectDisplayName(subjectInput, currentLang) {
        if (!subjectInput) return "";
        const searchStr = subjectInput.trim().toLowerCase();
        const match = SUBJECTS_DATABASE_MAP.find(
          (item) =>
            item.key.toLowerCase() === searchStr ||
            item.matches.some((m) => m.toLowerCase() === searchStr) ||
            item.en.toLowerCase() === searchStr ||
            item.ta.toLowerCase() === searchStr,
        );
        if (match) {
          return currentLang === "ta" ? match.ta : match.en;
        }
        if (currentLang === "ta") {
          return (
            TAMIL_MAP[subjectInput] || SUBJECT_MAP[subjectInput] || subjectInput
          );
        } else {
          return SUBJECT_MAP[subjectInput] || subjectInput;
        }
      }

      // --- Smooth Clock Generator ---
      function startClock() {
        const updateTime = () => {
          const now = new Date();
          let hours = now.getHours();
          const mins = now.getMinutes().toString().padStart(2, "0");
          const ampm = hours >= 12 ? "PM" : "AM";
          hours = hours % 12;
          hours = hours ? hours : 12;
          timeString = `${hours}:${mins} ${ampm}`;

          const clockElement = document.getElementById("smartphone-clock");
          if (clockElement) {
            clockElement.innerText = timeString;
          }
          const sidebarClock = document.getElementById("sidebar-clock");
          if (sidebarClock) {
            sidebarClock.innerText = timeString;
          }
        };
        updateTime();
        setInterval(updateTime, 10000);
      }

      async function trackDailyTraffic() {
        if (!db) return;
        try {
          const today = new Date().toLocaleDateString('en-CA');
          const trafficRef = doc(db, "traffic", today);
          const snap = await getDoc(trafficRef);
          if (snap.exists()) {
            const cur = snap.data().count || 0;
            await setDoc(trafficRef, { count: cur + 1, date: today }, { merge: true });
          } else {
            await setDoc(trafficRef, { count: 1, date: today });
          }
        } catch (e) {
          console.log("Error:", typeof e !== "undefined" ? (e.message || e) : "Unknown error");
        }
      }

          const firebaseConfig = await response.json();

          const app = initializeApp(firebaseConfig);

          db = initializeFirestore(
            app,
            {
              experimentalForceLongPolling: true,
            },
            firebaseConfig.firestoreDatabaseId,
          );

          await trackDailyTraffic();

          auth = getAuth(app);

          if (!authInitialized) {
            authInitialized = true;
            onAuthStateChanged(auth, async (user) => {
              if (user) {
                currentUser = user;
                currentUserEmail = user.email;
                isAdminUser = user.email === "kishanth8254@gmail.com";

                try {
                  const userSnap = await getDoc(doc(db, "users", user.uid));
                  if (userSnap.exists()) {
                    userProfile = userSnap.data();
                    if (userProfile.banned === true) {
                      alert(lang === "ta" ? "உங்கள் கணக்கு நிர்வாகியால் தடை செய்யப்பட்டுள்ளது." : "Your account has been banned by the admin.");

                      renderApp();
                      return;

                  } else {
                    userProfile = null;

                if (isAdminUser) {

      window.syncSupportMessages = async () => {
        if (!db) return;
        try {
          let msgs = [];
          if (isAdminUser) {
            const q = query(collection(db, "supportMessages"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            snap.forEach((doc) => {
              msgs.push({ id: doc.id, ...doc.data() });
            });
          } else if (currentUser) {
            // Avoid composite index requirement by filtering and sorting client-side
            const q = query(
              collection(db, "supportMessages"),
              where("userId", "==", currentUser.uid)
            );
            const snap = await getDocs(q);
            snap.forEach((doc) => {
              msgs.push({ id: doc.id, ...doc.data() });
            });
            msgs.sort((a, b) => {
              const tA = a.createdAt?.seconds || 0;
              const tB = b.createdAt?.seconds || 0;
              return tB - tA;
            });
          } else {
            // Guest support message
            const guestMsgId = localStorage.getItem("pending_guest_message_id");
            if (guestMsgId) {
              const docSnap = await getDoc(doc(db, "supportMessages", guestMsgId));
              if (docSnap.exists()) {
                msgs.push({ id: docSnap.id, ...docSnap.data() });
              } else {
                localStorage.removeItem("pending_guest_message_id");
              }
            }
          }
          supportMessages = msgs;
          renderApp();
        } catch (e) {
          console.log("Error:", typeof e !== "undefined" ? (e.message || e) : "Unknown error");
        }
      };

      function calculateAge(dobString) {
        if (!dobString) return "";
        const dobDate = new Date(dobString);
        if (isNaN(dobDate.getTime())) return "";
        const today = new Date();
        let age = today.getFullYear() - dobDate.getFullYear();
        const m = today.getMonth() - dobDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < dobDate.getDate())) {
          age--;
        }
        return age >= 0 ? age : 0;
      }

                        <select id="edit-user-role" class="w-full bg-slate-50 dark:bg-slate-950 text-[10px] text-slate-900 dark:text-white border dark:border-slate-850 rounded-lg p-2 font-bold focus:outline-none">
                          <option value="student" ${editingUserObj.role === 'student' ? 'selected' : ''}>Student/Normal</option>
                          <option value="admin" ${editingUserObj.role === 'admin' ? 'selected' : ''}>Administrator</option>
                        </select>
                      </div>
                    </div>

                    <div>
                      <label class="block text-[8px] font-extrabold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1">${lang === "ta" ? "பாடசாலை" : "School"}</label>
                      <input type="text" id="edit-user-school" value="${editingUserObj.school || ''}" class="w-full bg-slate-50 dark:bg-slate-950 text-[10px] text-slate-900 dark:text-white border dark:border-slate-850 rounded-lg p-2 font-bold focus:outline-none focus:ring-1 focus:ring-neon-purple" />
                    </div>

                    <div class="grid grid-cols-2 gap-2.5">
                      <div>
                        <label class="block text-[8px] font-extrabold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1">${lang === "ta" ? "பிறந்த திகதி" : "DOB"}</label>
                        <input type="date" id="edit-user-dob" value="${editingUserObj.dob || ''}" class="w-full bg-slate-50 dark:bg-slate-950 text-[10px] text-slate-900 dark:text-white border dark:border-slate-850 rounded-lg p-2 font-bold focus:outline-none focus:ring-1 focus:ring-neon-purple" />
                      </div>
                      <div>
                        <label class="block text-[8px] font-extrabold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1">${lang === "ta" ? "தொலைபேசி எண்" : "Phone"}</label>
                        <input type="text" id="edit-user-phone" value="${editingUserObj.phone || ''}" class="w-full bg-slate-50 dark:bg-slate-950 text-[10px] text-slate-900 dark:text-white border dark:border-slate-850 rounded-lg p-2 font-bold focus:outline-none focus:ring-1 focus:ring-neon-purple" />
                      </div>
                    </div>

                    <div class="pt-2.5">
                      <button onclick="window.adminSubmitUserEdit()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-black text-[10px] uppercase tracking-wider rounded-xl transition shadow shadow-indigo-200 dark:shadow-none hover:opacity-95">
                        ${lang === "ta" ? "விவரங்களைச் சேமி" : "Save Changes"}
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            `
                : ""
            }

          </div>
        `;

        bindEvents();
      }

      // --- Interactive Event Binders ---
      function bindEvents() {
        const tabs = [
          "home",
          "books",
          "papers",
          "videos",
          "about",
          "contact",
          "login",
          "admin",
          "profile",
        ];
        tabs.forEach((tab) => {
          document
            .querySelectorAll(`.nav-tab-${tab}, #nav-tab-${tab}`)
            .forEach((btn) => {
              btn.onclick = () => {
                let targetTab = tab;
                if (tab === "admin") {
                  targetTab = currentUser ? "admin" : "login";
                }
                window.location.hash = "#/" + targetTab;
                contactSuccess = false;
                if (tab !== "books" && tab !== "papers" && tab !== "videos") {
                  searchKeyword = "";
                }
              };
            });
        });

        document
          .querySelectorAll(".lang-ta-btn, #lang-ta-btn")
          .forEach((btn) => {
            btn.onclick = () => {
              lang = "ta";
              renderApp();
            };
          });

        document
          .querySelectorAll(".lang-en-btn, #lang-en-btn")
          .forEach((btn) => {
            btn.onclick = () => {
              lang = "en";
              renderApp();
            };
          });

        document
          .querySelectorAll(".theme-toggle-btn, #theme-toggle-btn")
          .forEach((btn) => {
            btn.onclick = () => {
              darkMode = !darkMode;
              renderApp();
            };
          });

        const exploreBooksBtn = document.getElementById(
          "home-explore-books-btn",
        );
        if (exploreBooksBtn) {
          exploreBooksBtn.onclick = () => {
            currentTab = "books";
            selectedGrade = "All";
            selectedSubject = "All";
            searchKeyword = "";
            renderApp();
          };
        }

        const registerPromoBtn = document.getElementById(
          "home-register-promo-btn",
        );
        if (registerPromoBtn) {
          registerPromoBtn.onclick = () => {
            authMode = "register";
            window.location.hash = "#/login";
          };
        }

        const bookSearch = document.getElementById("book-filter-search");
        if (bookSearch) {
          bookSearch.oninput = (e) => {
            searchKeyword = e.target.value;
            const booksGrid = document.getElementById("books-grid-renderer");
            if (booksGrid) renderApp();
          };
        }

        const bookGrade = document.getElementById("book-grade-select");
        if (bookGrade) {
          bookGrade.onchange = (e) => {
            selectedGrade = e.target.value;
            renderApp();
          };
        }

        const bookSub = document.getElementById("book-subject-select");
        if (bookSub) {
          bookSub.onchange = (e) => {
            selectedSubject = e.target.value;
            renderApp();
          };
        }

        const paperSearch = document.getElementById("paper-filter-search");
        if (paperSearch) {
          paperSearch.oninput = (e) => {
            searchKeyword = e.target.value;
            renderApp();
          };
        }

        const paperExam = document.getElementById("paper-examtype-select");
        if (paperExam) {
          paperExam.onchange = (e) => {
            selectedExamType = e.target.value;
            renderApp();
          };
        }

        const paperSub = document.getElementById("paper-subject-select");
        if (paperSub) {
          paperSub.onchange = (e) => {
            selectedSubject = e.target.value;
            renderApp();
          };
        }

        const videoSearch = document.getElementById("video-filter-search");
        if (videoSearch) {
          videoSearch.oninput = (e) => {
            searchKeyword = e.target.value;
            renderApp();
          };
        }

        const videoGrade = document.getElementById("video-grade-select");
        if (videoGrade) {
          videoGrade.onchange = (e) => {
            selectedGrade = e.target.value;
            renderApp();
          };
        }

        const videoSub = document.getElementById("video-subject-select");
        if (videoSub) {
          videoSub.onchange = (e) => {
            selectedSubject = e.target.value;
            renderApp();
          };
        }

        const videoTriggers = document.querySelectorAll(".video-trigger-btn");
        videoTriggers.forEach((btn) => {
          btn.onclick = () => {
            const ytid = btn.getAttribute("data-ytid");
            const title = btn.getAttribute("data-title");
            if (ytid) {
              activeVideoId = ytid;
              activeVideoTitle = title || "";
              renderApp();
            }
          };
        });

        const pdfTriggers = document.querySelectorAll(".pdf-trigger-btn");
        pdfTriggers.forEach((btn) => {
          btn.onclick = () => {
            const url = btn.getAttribute("data-url");
            const title = btn.getAttribute("data-title");
            if (url) {
              activePdfUrl = url;
              activePdfTitle = title;
              renderApp();
            }
          };
        });

        const pdfClose = document.getElementById("pdf-close-btn");
        if (pdfClose) {
          pdfClose.onclick = () => {
            activePdfUrl = null;
            activePdfTitle = null;
            renderApp();
          };
        }

        const pdfCopy = document.getElementById("pdf-copy-btn");
        if (pdfCopy && activePdfUrl) {
          pdfCopy.onclick = () => {
            navigator.clipboard.writeText(activePdfUrl).then(() => {
              const copyText = document.getElementById("copy-btn-text");
              if (copyText) {
                copyText.innerText =
                  lang === "ta" ? "நகலெடுக்கப்பட்டது!" : "Copied!";
                setTimeout(() => {
                  if (copyText)
                    copyText.innerText =
                      lang === "ta" ? "இணைப்பை நகலெடு" : "Copy link";
                }, 1800);
              }
            });
          };
        }

        const contactForm = document.getElementById("contact-form-renderer");
        if (contactForm) {
          contactForm.onsubmit = async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById("form-name-input").value.trim();
            const email = document.getElementById("form-email-input").value.trim();
            const message = document.getElementById("form-message-input").value.trim();
            
            if (!fullName || !email || !message) {
              alert(lang === "ta" ? "தயவுசெய்து அனைத்து விவரங்களையும் பூர்த்தி செய்யவும்." : "Please fill in all details.");
              return;
            }

            // Check if there is already a pending support message
            if (currentUser) {
              const hasPending = supportMessages.some(m => m.status === "pending");
              if (hasPending) {
                alert(lang === "ta" ? "உங்களிடம் ஏற்கனவே நிலுவையில் உள்ள செய்தி உள்ளது. அதற்கு பதில் வரும் வரை புதிய செய்தியை அனுப்ப முடியாது." : "You already have a pending support message. You cannot send another until you receive a reply.");
                return;
              }
            } else {
              // Unauthenticated check using localStorage to avoid permission errors
              const existingPendingId = localStorage.getItem("pending_guest_message_id");
              if (existingPendingId) {
                const hasPending = supportMessages.some(m => m.id === existingPendingId && m.status === "pending");
                if (hasPending) {
                  alert(lang === "ta" ? "உங்களிடம் ஏற்கனவே நிலுவையில் உள்ள செய்தி உள்ளது. அதற்கு பதில் வரும் வரை புதிய செய்தியை அனுப்ப முடியாது." : "You already have a pending support message. You cannot send another until you receive a reply.");
                  return;
                }
              }
            }

            try {
              const id = "msg-" + Date.now();
              const docData = {
                id: id,
                fullName,
                email,
                message,
                status: "pending",
                createdAt: serverTimestamp()
              };
              
              if (currentUser) {
                docData.userId = currentUser.uid;
              }
              
              if (db) {
                await setDoc(doc(db, "supportMessages", id), docData);
                if (!currentUser) {
                  localStorage.setItem("pending_guest_message_id", id);
                }
                contactSuccess = true;
                await syncSupportMessages();
              } else {
                // If db not loaded for some reason, fallback
                contactSuccess = true;
                renderApp();
              }
            } catch (err) {
              console.error("Error:", typeof e !== "undefined" ? (e.message || e) : (typeof err !== "undefined" ? (err.message || err) : "Unknown error"));
              alert("Error sending support message: " + err.message);
            }
          };
        }

        const contactReset = document.getElementById("contact-reset-btn");
        if (contactReset) {
          contactReset.onclick = () => {
            contactSuccess = false;
            renderApp();
          };
        }

        // --- Administrative & Authentication form binders ---
        const homeAuthLoginBtn = document.getElementById("home-auth-login-btn");
        if (homeAuthLoginBtn) {
          homeAuthLoginBtn.onclick = async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById("home-auth-email");
            const pwdInput = document.getElementById("home-auth-password");
            if (emailInput && pwdInput && emailInput.value && pwdInput.value) {
              await handleUserLogin(emailInput.value, pwdInput.value);
            } else {
              alert(
                "மின்னஞ்சல் மற்றும் கடவுச்சொல்லை உள்ளிடவும் / Please enter email and password",
              );
            }
          };
        }

        const homeAuthRegisterBtn = document.getElementById("home-auth-register-btn");
        if (homeAuthRegisterBtn) {
          homeAuthRegisterBtn.onclick = async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById("home-auth-email");
            const pwdInput = document.getElementById("home-auth-password");
            if (emailInput && pwdInput && emailInput.value && pwdInput.value) {
              await handleUserRegister(emailInput.value, pwdInput.value);
            } else {
              alert(
                "மின்னஞ்சல் மற்றும் கடவுச்சொல்லை உள்ளிடவும் / Please enter email and password",
              );
            }
          };
        }

        const authLoginBtn = document.getElementById("auth-login-btn");
        if (authLoginBtn) {
          authLoginBtn.onclick = async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById("auth-email");
            const pwdInput = document.getElementById("auth-password");
            if (emailInput && pwdInput && emailInput.value && pwdInput.value) {
              await handleUserLogin(emailInput.value, pwdInput.value);
            } else {
              alert(
                "மின்னஞ்சல் மற்றும் கடவுச்சொல்லை உள்ளிடவும் / Please enter email and password",
              );
            }
          };
        }

        const authRegisterBtn = document.getElementById("auth-register-btn");
        if (authRegisterBtn) {
          authRegisterBtn.onclick = async (e) => {
            e.preventDefault();
            const fName = document.getElementById("auth-reg-firstName")?.value;
            const lName = document.getElementById("auth-reg-lastName")?.value;
            const dob = document.getElementById("auth-reg-dob")?.value;
            const phone = document.getElementById("auth-reg-phone")?.value;
            const school = document.getElementById("auth-reg-school")?.value;
            const emailInput = document.getElementById("auth-reg-email");
            const pwdInput = document.getElementById("auth-reg-password");
            const accountTypeInput = document.getElementById("auth-reg-accountType");
            
            if (emailInput && pwdInput && emailInput.value && pwdInput.value) {
              await handleUserRegister(fName, lName, dob, school, phone, emailInput.value, pwdInput.value, accountTypeInput?.value);
            } else {
              alert(
                "மின்னஞ்சல் மற்றும் கடவுச்சொல்லை உள்ளிடவும் / Please enter email and password",
              );
            }
          };
        }

        // Inline Books adding Form
        const inlineAddBookBtn = document.getElementById("inline-book-submit-btn");
        if (inlineAddBookBtn) {
          inlineAddBookBtn.onclick = async (e) => {
            e.preventDefault();
            const title = document.getElementById("inline-book-title")?.value;
            const grade = document.getElementById("inline-book-grade")?.value;
            const subject = document.getElementById("inline-book-subject")?.value;
            const pdfUrl = document.getElementById("inline-book-pdfurl")?.value;
            if (title && grade && subject && pdfUrl) {
              await addBookToDB(title, grade, subject, pdfUrl);
            } else {
              alert("Please fill all fields / அனைத்து விவரங்களையும் பூர்த்தி செய்யவும்");
            }
          };
        }

        // Inline Papers adding Form
        const inlineAddPaperBtn = document.getElementById("inline-paper-submit-btn");
        if (inlineAddPaperBtn) {
          inlineAddPaperBtn.onclick = async (e) => {
            e.preventDefault();
            const year = parseInt(document.getElementById("inline-paper-year")?.value);
            const examType = document.getElementById("inline-paper-examtype")?.value;
            const subject = document.getElementById("inline-paper-subject")?.value;
            const pdfUrl = document.getElementById("inline-paper-pdfurl")?.value;
            if (year && examType && subject && pdfUrl) {
              await addPastPaperToDB(year, examType, subject, pdfUrl);
            } else {
              alert("Please fill all fields / அனைத்து விவரங்களையும் பூர்த்தி செய்யவும்");
            }
          };
        }

        // Inline Videos adding Form
        const inlineAddVideoBtn = document.getElementById("inline-video-submit-btn");
        if (inlineAddVideoBtn) {
          inlineAddVideoBtn.onclick = async (e) => {
            e.preventDefault();
            const title = document.getElementById("inline-vid-title")?.value;
            const lessonName = document.getElementById("inline-vid-lesson")?.value;
            const grade = document.getElementById("inline-vid-grade")?.value;
            const subject = document.getElementById("inline-vid-subject")?.value;
            const category = document.getElementById("inline-vid-category")?.value;
            let youtubeIdInput = document.getElementById("inline-vid-ytid")?.value.trim() || "";
            let youtubeId = youtubeIdInput;
            if (youtubeIdInput) {
              const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/|live\/)([^#\&\?]*).*/;
              const match = youtubeIdInput.match(regExp);
              if (match && match[2].length === 11) {
                youtubeId = match[2];
              } else {
                const fallbackMatch = youtubeIdInput.match(/[a-zA-Z0-9_-]{11}/);
                if (fallbackMatch) {
                  youtubeId = fallbackMatch[0];
                }
              }
            }
            if (title && lessonName && grade && subject && category && youtubeId) {
              await addVideoToDB(title, lessonName, grade, subject, youtubeId, category);
            } else {
              alert("Please fill all fields / அனைத்து விவரங்களையும் பூர்த்தி செய்யவும்");
            }
          };
        }

        const addCategoryForm = document.getElementById(
          "admin-add-category-form",
        );
        if (addCategoryForm) {
          addCategoryForm.onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById("add-category-name").value;
            await addCategoryToDB(name);
          };
        }
      }

      // --- Initialization Boots ---
      startClock();
      syncData();
      handleRoute();
    </script>
  </body>
</html>
