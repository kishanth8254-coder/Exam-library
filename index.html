      function getSubjectDisplayName(subjectInput, currentLang) {
        if (!subjectInput) return "";
        const searchStr = subjectInput.trim().toLowerCase();
        const match = SUBJECTS_DATABASE_MAP.find(
          (item) =>
            item.key.toLowerCase() === searchStr ||
            item.matches.some((m) => m.toLowerCase() === searchStr) ||
            item.en.toLowerCase() === searchStr ||
            item.ta.toLowerCase() === searchStr,
        );
        if (match) {
          return currentLang === "ta" ? match.ta : match.en;
        }
        if (currentLang === "ta") {
          return (
            TAMIL_MAP[subjectInput] || SUBJECT_MAP[subjectInput] || subjectInput
          );
        } else {
          return SUBJECT_MAP[subjectInput] || subjectInput;
        }
      }

      // --- Smooth Clock Generator ---
      function startClock() {
        const updateTime = () => {
          const now = new Date();
          let hours = now.getHours();
          const mins = now.getMinutes().toString().padStart(2, "0");
          const ampm = hours >= 12 ? "PM" : "AM";
          hours = hours % 12;
          hours = hours ? hours : 12;
          timeString = `${hours}:${mins} ${ampm}`;

          const clockElement = document.getElementById("smartphone-clock");
          if (clockElement) {
            clockElement.innerText = timeString;
          }
          const sidebarClock = document.getElementById("sidebar-clock");
          if (sidebarClock) {
            sidebarClock.innerText = timeString;
          }
        };
        updateTime();
        setInterval(updateTime, 10000);
      }

          if (!response.ok) throw new Error("Unresolved local file config");
          const firebaseConfig = await response.json();

          const app = initializeApp(firebaseConfig);

          db = initializeFirestore(
            app,
            {
              experimentalForceLongPolling: true,
            },
            firebaseConfig.firestoreDatabaseId,
          );

          auth = getAuth(app);

          if (!authInitialized) {
            authInitialized = true;
            onAuthStateChanged(auth, async (user) => {
              if (user) {
                currentUser = user;
                currentUserEmail = user.email;
                isAdminUser = user.email === "kishanth8254@gmail.com";

                try {
                  const userSnap = await getDoc(doc(db, "users", user.uid));
                  if (userSnap.exists()) {
                    userProfile = userSnap.data();
                  } else {

      function calculateAge(dobString) {
        if (!dobString) return "";
        const dobDate = new Date(dobString);
        if (isNaN(dobDate.getTime())) return "";
        const today = new Date();
        let age = today.getFullYear() - dobDate.getFullYear();
        const m = today.getMonth() - dobDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < dobDate.getDate())) {
          age--;
        }
        return age >= 0 ? age : 0;
      }

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
                      </svg>
                    </button>
                  </div>

                  <div class="bg-slate-100 dark:bg-slate-950 rounded-xl p-6 text-center border border-slate-200 dark:border-slate-900 flex flex-col justify-center items-center space-y-3.5 select-none animate-pulse">
                    <svg class="w-9 h-9 text-blue-500 dark:text-neon-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    <div>
                      <p class="text-[10px] font-extrabold text-slate-700 dark:text-slate-200 leading-tight">${lang === "ta" ? "அரசு தாள்கள் நேரடி பதிவிறக்கம்" : "Direct Academic Resource Access"}</p>
                      <p class="text-[8px] text-slate-400 font-bold block mt-1">${lang === "ta" ? "சிறந்த முறையில் படித்து பரீட்சையில் வெற்றி பெறுங்கள்!" : "Prepare with high academic fidelity!"}</p>
                    </div>
                  </div>

                  <div class="grid grid-cols-2 gap-2">
                    <a href="${activePdfUrl}" target="_blank" download="${activePdfTitle}.pdf" class="p-2.5 bg-blue-600 dark:bg-neon-cyan text-white dark:text-slate-950 font-black text-[10px] uppercase text-center rounded-xl transition shadow hover:opacity-90 flex items-center justify-center space-x-1.5 cursor-pointer">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                      </svg>
                      <span>${lang === "ta" ? "பதிவிறக்கு" : "Download PDF"}</span>
                    </a>
                    <button id="pdf-copy-btn" class="p-2.5 bg-slate-100 dark:bg-slate-900 border dark:border-slate-800 text-slate-700 dark:text-slate-300 font-black text-[10px] uppercase text-center rounded-xl transition hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center space-x-1.5">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                      </svg>
                      <span id="copy-btn-text">${lang === "ta" ? "இணைப்பை நகலெடு" : "Copy link"}</span>
                    </button>
                  </div>
                </div>
              </div>
            `
                : ""
            }

          </div>
        `;

        bindEvents();
      }

      // --- Interactive Event Binders ---
      function bindEvents() {
        const tabs = [
          "home",
          "books",
          "papers",
          "videos",
          "about",
          "contact",
          "login",
          "admin",
          "profile",
        ];
        tabs.forEach((tab) => {
          document
            .querySelectorAll(`.nav-tab-${tab}, #nav-tab-${tab}`)
            .forEach((btn) => {
              btn.onclick = () => {
                let targetTab = tab;
                if (tab === "admin") {
                  targetTab = currentUser ? "admin" : "login";
                }
                window.location.hash = "#/" + targetTab;
                contactSuccess = false;
                if (tab !== "books" && tab !== "papers" && tab !== "videos") {
                  searchKeyword = "";
                }
              };
            });
        });

        document
          .querySelectorAll(".lang-ta-btn, #lang-ta-btn")
          .forEach((btn) => {
            btn.onclick = () => {
              lang = "ta";
              renderApp();
            };
          });

        document
          .querySelectorAll(".lang-en-btn, #lang-en-btn")
          .forEach((btn) => {
            btn.onclick = () => {
              lang = "en";
              renderApp();
            };
          });

        document
          .querySelectorAll(".theme-toggle-btn, #theme-toggle-btn")
          .forEach((btn) => {
            btn.onclick = () => {
              darkMode = !darkMode;
              renderApp();
            };
          });

        const exploreBooksBtn = document.getElementById(
          "home-explore-books-btn",
        );
        if (exploreBooksBtn) {
          exploreBooksBtn.onclick = () => {
            currentTab = "books";
            selectedGrade = "All";
            selectedSubject = "All";
            searchKeyword = "";
            renderApp();
          };
        }

        const registerPromoBtn = document.getElementById(
          "home-register-promo-btn",
        );
        if (registerPromoBtn) {
          registerPromoBtn.onclick = () => {
            authMode = "register";
            window.location.hash = "#/login";
          };
        }

        const bookSearch = document.getElementById("book-filter-search");
        if (bookSearch) {
          bookSearch.oninput = (e) => {
            searchKeyword = e.target.value;
            const booksGrid = document.getElementById("books-grid-renderer");
            if (booksGrid) renderApp();
          };
        }

        const bookGrade = document.getElementById("book-grade-select");
        if (bookGrade) {
          bookGrade.onchange = (e) => {
            selectedGrade = e.target.value;
            renderApp();
          };
        }

        const bookSub = document.getElementById("book-subject-select");
        if (bookSub) {
          bookSub.onchange = (e) => {
            selectedSubject = e.target.value;
            renderApp();
          };
        }

        const paperSearch = document.getElementById("paper-filter-search");
        if (paperSearch) {
          paperSearch.oninput = (e) => {
            searchKeyword = e.target.value;
            renderApp();
          };
        }

        const paperExam = document.getElementById("paper-examtype-select");
        if (paperExam) {
          paperExam.onchange = (e) => {
            selectedExamType = e.target.value;
            renderApp();
          };
        }

        const paperSub = document.getElementById("paper-subject-select");
        if (paperSub) {
          paperSub.onchange = (e) => {
            selectedSubject = e.target.value;
            renderApp();
          };
        }

        const videoSearch = document.getElementById("video-filter-search");
        if (videoSearch) {
          videoSearch.oninput = (e) => {
            searchKeyword = e.target.value;
            renderApp();
          };
        }

        const videoGrade = document.getElementById("video-grade-select");
        if (videoGrade) {
          videoGrade.onchange = (e) => {
            selectedGrade = e.target.value;
            renderApp();
          };
        }

        const videoSub = document.getElementById("video-subject-select");
        if (videoSub) {
          videoSub.onchange = (e) => {
            selectedSubject = e.target.value;
            renderApp();
          };
        }

        const videoTriggers = document.querySelectorAll(".video-trigger-btn");
        videoTriggers.forEach((btn) => {
          btn.onclick = () => {
            const ytid = btn.getAttribute("data-ytid");
            const title = btn.getAttribute("data-title");
            if (ytid) {
              activeVideoId = ytid;
              activeVideoTitle = title || "";
              renderApp();
            }
          };
        });

        const pdfTriggers = document.querySelectorAll(".pdf-trigger-btn");
        pdfTriggers.forEach((btn) => {
          btn.onclick = () => {
            const url = btn.getAttribute("data-url");
            const title = btn.getAttribute("data-title");
            if (url) {
              activePdfUrl = url;
              activePdfTitle = title;
              renderApp();
            }
          };
        });

        const pdfClose = document.getElementById("pdf-close-btn");
        if (pdfClose) {
          pdfClose.onclick = () => {
            activePdfUrl = null;
            activePdfTitle = null;
            renderApp();
          };
        }

        const pdfCopy = document.getElementById("pdf-copy-btn");
        if (pdfCopy && activePdfUrl) {
          pdfCopy.onclick = () => {
            navigator.clipboard.writeText(activePdfUrl).then(() => {
              const copyText = document.getElementById("copy-btn-text");
              if (copyText) {
                copyText.innerText =
                  lang === "ta" ? "நகலெடுக்கப்பட்டது!" : "Copied!";
                setTimeout(() => {
                  if (copyText)
                    copyText.innerText =
                      lang === "ta" ? "இணைப்பை நகலெடு" : "Copy link";
                }, 1800);
              }
            });
          };
        }

        const contactForm = document.getElementById("contact-form-renderer");
        if (contactForm) {
          contactForm.onsubmit = (e) => {
            e.preventDefault();
            contactSuccess = true;
            renderApp();
          };
        }

        const contactReset = document.getElementById("contact-reset-btn");
        if (contactReset) {
          contactReset.onclick = () => {
            contactSuccess = false;
            renderApp();
          };
        }

        // --- Administrative & Authentication form binders ---
        const homeAuthLoginBtn = document.getElementById("home-auth-login-btn");
        if (homeAuthLoginBtn) {
          homeAuthLoginBtn.onclick = async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById("home-auth-email");
            const pwdInput = document.getElementById("home-auth-password");
            if (emailInput && pwdInput && emailInput.value && pwdInput.value) {
              await handleUserLogin(emailInput.value, pwdInput.value);
            } else {
              alert(
                "மின்னஞ்சல் மற்றும் கடவுச்சொல்லை உள்ளிடவும் / Please enter email and password",
              );
            }
          };
        }

        const homeAuthRegisterBtn = document.getElementById("home-auth-register-btn");
        if (homeAuthRegisterBtn) {
          homeAuthRegisterBtn.onclick = async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById("home-auth-email");
            const pwdInput = document.getElementById("home-auth-password");
            if (emailInput && pwdInput && emailInput.value && pwdInput.value) {
              await handleUserRegister(emailInput.value, pwdInput.value);
            } else {
              alert(
                "மின்னஞ்சல் மற்றும் கடவுச்சொல்லை உள்ளிடவும் / Please enter email and password",
              );
            }
          };
        }

        const authLoginBtn = document.getElementById("auth-login-btn");
        if (authLoginBtn) {
          authLoginBtn.onclick = async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById("auth-email");
            const pwdInput = document.getElementById("auth-password");
            if (emailInput && pwdInput && emailInput.value && pwdInput.value) {
              await handleUserLogin(emailInput.value, pwdInput.value);
            } else {
              alert(
                "மின்னஞ்சல் மற்றும் கடவுச்சொல்லை உள்ளிடவும் / Please enter email and password",
              );
            }
          };
        }

        const authRegisterBtn = document.getElementById("auth-register-btn");
        if (authRegisterBtn) {
          authRegisterBtn.onclick = async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById("auth-email");
            const pwdInput = document.getElementById("auth-password");
            if (emailInput && pwdInput && emailInput.value && pwdInput.value) {
              await handleUserRegister(emailInput.value, pwdInput.value);
            } else {
              alert(
                "மின்னஞ்சல் மற்றும் கடவுச்சொல்லை உள்ளிடவும் / Please enter email and password",
              );
            }
          };
        }

        const addBookForm = document.getElementById("admin-add-book-form");
        if (addBookForm) {
          addBookForm.onsubmit = async (e) => {
            e.preventDefault();
            const title = document.getElementById("add-book-title").value;
            const grade = document.getElementById("add-book-grade").value;
            const subject = document.getElementById("add-book-subject").value;
            const pdfUrl = document.getElementById("add-book-pdfurl").value;
            await addBookToDB(title, grade, subject, pdfUrl);
          };
        }

        const addPaperForm = document.getElementById("admin-add-paper-form");
        if (addPaperForm) {
          addPaperForm.onsubmit = async (e) => {
            e.preventDefault();
            const year = parseInt(
              document.getElementById("add-paper-year").value,
            );
            const examType =
              document.getElementById("add-paper-examtype").value;
            const subject = document.getElementById("add-paper-subject").value;
            const pdfUrl = document.getElementById("add-paper-pdfurl").value;
            await addPastPaperToDB(year, examType, subject, pdfUrl);
          };
        }

        const addVideoForm = document.getElementById("admin-add-video-form");
        if (addVideoForm) {
          addVideoForm.onsubmit = async (e) => {
            e.preventDefault();
            const title = document.getElementById("add-vid-title").value;
            const lessonName = document.getElementById("add-vid-lesson").value;
            const grade = document.getElementById("add-vid-grade").value;
            const subject = document.getElementById("add-vid-subject").value;
            const category = document.getElementById("add-vid-category").value;
            let youtubeIdInput = document.getElementById("add-vid-ytid").value.trim();
            let youtubeId = youtubeIdInput;
            if (youtubeIdInput) {
              const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/|live\/)([^#\&\?]*).*/;
              const match = youtubeIdInput.match(regExp);
              if (match && match[2].length === 11) {
                youtubeId = match[2];
              } else {
                // fallback match for any 11-char ID in the string if it contains one
                const fallbackMatch = youtubeIdInput.match(/[a-zA-Z0-9_-]{11}/);
                if (fallbackMatch) {
                  youtubeId = fallbackMatch[0];
                }
              }
            }
            await addVideoToDB(
              title,
              lessonName,
              grade,
              subject,
              youtubeId,
              category,
            );
          };
        }

        const addCategoryForm = document.getElementById(
          "admin-add-category-form",
        );
        if (addCategoryForm) {
          addCategoryForm.onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById("add-category-name").value;
            await addCategoryToDB(name);
          };
        }
      }

      // --- Initialization Boots ---
      startClock();
      syncData();
      handleRoute();
    </script>
  </body>
</html>
